            color: var(--error-red);

            display: none;

let currentIndex = 0;
let firstTryCorrectCount = 0;
let isFirstTry = true;
let mistakes = [];

function speakText() {
    const qData = quizList[currentIndex];
    if (!qData.audioText) return;
    
    speechSynthesis.cancel();
    const uttr = new SpeechSynthesisUtterance(qData.audioText);
    uttr.lang = 'en-US';
    uttr.rate = 0.95; 
    speechSynthesis.speak(uttr);
}

function loadQuestion() {
    const current = quizList[currentIndex];
    
    document.getElementById('progress').textContent = `${currentIndex + 1} / ${quizList.length}`;
    document.getElementById('question-text').innerHTML = current.q;
    
    const sentenceArea = document.getElementById('sentence-area');
    if (current.sentence) {
        sentenceArea.innerHTML = current.sentence + ` <button class="audio-btn-inline" onclick="speakText()" title="Listen to text">🔊</button>`;
        sentenceArea.style.display = 'block';
    } else {
        sentenceArea.style.display = 'none';
    }
    
    const feedbackArea = document.getElementById('feedback-area');
    feedbackArea.style.display = 'none';
    feedbackArea.className = 'feedback-box';
    
    document.getElementById('next-btn').style.display = 'none';
    isFirstTry = true;

    let choices = [...current.choices];
    if (current.type !== "dm") {
        choices.sort(() => Math.random() - 0.5);
    }

    const container = document.getElementById('choices-container');
    container.innerHTML = '';

    

    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice;
        btn.onclick = () => checkAnswer(choice, current.correct, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(selected, correct, btn) {
    const current = quizList[currentIndex];
    const feedbackArea = document.getElementById('feedback-area');
    
    if (feedbackArea.style.display === 'block' && feedbackArea.classList.contains('feedback-success')) return;

    if (selected.trim() === correct.trim()) {
        btn.classList.add('correct');
        if (isFirstTry) {
            firstTryCorrectCount++;
            feedbackArea.className = 'feedback-box feedback-success';
            feedbackArea.innerHTML = `✨ 正解！<br><span style="font-weight:normal; font-size:0.95rem;">${current.explanation}</span>`;
        } else {
            feedbackArea.className = 'feedback-box feedback-success';
            feedbackArea.innerHTML = `👍 正解です！<br><span style="font-weight:normal; font-size:0.95rem;">${current.explanation}</span>`;
        }
        feedbackArea.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach(b => { if (b !== btn) b.style.opacity = '0.6'; });
    } else {
        if (isFirstTry) {
            let cleanQTitle = current.q.split('<br>')[1] || current.q;
            mistakes.push({
                q: cleanQTitle,
                sentence: current.sentence,
                correct: current.correct
            });
            isFirstTry = false;
        }
        btn.classList.add('wrong');
        feedbackArea.className = 'feedback-box feedback-error';
        feedbackArea.innerHTML = `❌ もう一度考えてみましょう！`;
        feedbackArea.style.display = 'block';
    }
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < quizList.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').textContent = firstTryCorrectCount;
    document.getElementById('total-score-count').textContent = quizList.length;

    if (mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        const listDiv = document.getElementById('mistake-list');
        listDiv.innerHTML = mistakes.map(m => `
            <div class="mistake-item">
                <strong>${m.q}</strong><br>
                <span style="color:#666; font-size:0.9rem;">対象の英文：${m.sentence}</span><br>
                <span style="color:var(--success-green);">覚えるべき正解：${m.correct}</span>
            </div>
        `).join('');
    }
}

function sendEmail() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = encodeURIComponent("【英検準1級】Feminist Architecture 文法・語彙アクティビティ結果報告");
    
    let mistakeText = mistakes.length > 0 
        ? "\n\n■復習が必要な箇所:\n" + mistakes.map(m => `・${m.q} -> 正解: ${m.correct}`).join("\n")
        : "\n\nパーフェクトです！すべての文法・語彙問題を一発で正解しました！";

    const body = encodeURIComponent(`Tamaki先生へ\n\n英検準1級長文「Feminist Architecture」の文法・語彙アクティビティ（${quizList.length}問）を完了しました。\n\n【結果】\n${quizList.length}問中 ${firstTryCorrectCount} 問を一度で正解できました。${mistakeText}\n\n長文の精読に直結する重要な修飾関係や構文をしっかり身につけます！`);
    
    window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
}
